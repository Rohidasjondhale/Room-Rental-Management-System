<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .section-title {
      margin-bottom: 15px;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .two-column {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav>
    <h2>Dashboard</h2>
  </nav>

  <div class="container dashboard-grid">
    <div class="card">
      <h3 id="welcomeText"></h3>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="ownerLayout" style="display: none;">
      <div class="two-column">
        <div class="card" id="ownerSection" style="display: none;">
          <h3 class="section-title">Add Property</h3>
          <form onsubmit="addProperty(event)">
            <input type="text" id="title" placeholder="Property title" required>
            <textarea id="description" placeholder="Description" required></textarea>
            <input type="text" id="location" placeholder="Location" required>
            <input type="number" id="price" placeholder="Price" required>

            <select id="priceType" required>
              <option value="">Select Price Type</option>
              <option value="day">Per Day</option>
              <option value="month">Per Month</option>
              <option value="year">Per Year</option>
            </select>

            <button type="submit" id="propertySubmitBtn">Add Property</button>
          </form>
        </div>

        <div class="card" id="ownerPropertiesSection" style="display: none;">
          <h3 class="section-title">My Properties</h3>
          <div id="ownerPropertyList"></div>
        </div>
      </div>

      <div class="card" id="ownerBookingsSection" style="display: none; margin-top: 20px;">
        <h3 class="section-title">Owner Bookings</h3>
        <div id="ownerBookingList"></div>
      </div>
    </div>

    <div id="tenantLayout" style="display: none;">
      <div class="card" id="tenantSection" style="display: none;">
        <h3 class="section-title">Tenant Dashboard</h3>
        <a href="properties.html">View Properties</a>
      </div>

      <div class="card" id="myBookingsSection" style="display: none; margin-top: 20px;">
        <h3 class="section-title">My Bookings</h3>
        <div id="bookingList"></div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
